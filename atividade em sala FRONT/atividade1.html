<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Validador de CPF</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #e4e4e4;
      background-color: rgb(194, 175, 125);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      width: 320px;
      text-align: center;
    }

    h1 {
      margin-bottom: 20px;
      color: #333;
    }

    input {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      margin-bottom: 15px;
      border: 1px solid #ccc;
      border-radius: 5px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      background: #ebb60b;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #ffa600;
    }

    #resultado {
      margin-top: 20px;
      font-size: 18px;
      font-weight: bold;
    }

    .valido {
      color: green;
    }

    .invalido {
      color: red;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Validador de CPF</h1>

    <input type="text" id="cpf" placeholder="Digite o CPF" maxlength="14">

    <button onclick="validarCPF()">Validar</button>

    <div id="resultado"></div>
  </div>

  <script>
    function validarCPF() {
      const input = document.getElementById("cpf").value;
      const resultado = document.getElementById("resultado");

      const cpf = input.replace(/\D/g, "");


      if (cpf.length !== 11 || /^(\d)\1+$/.test(cpf)) {
        mostrarResultado(false);
        return;
      }

      // ===== 1º dígito =====
      let soma = 0;

      for (let i = 0; i < 9; i++) {
        soma += Number(cpf[i]) * (10 - i);
      }

      let digito1 = (soma * 10) % 11;

      if (digito1 === 10) digito1 = 0;

      // ===== 2º dígito =====
      soma = 0;

      for (let i = 0; i < 10; i++) {
        soma += Number(cpf[i]) * (11 - i);
      }

      let digito2 = (soma * 10) % 11;

      if (digito2 === 10) digito2 = 0;

      // Verifica os dígitos
      const valido =
        digito1 === Number(cpf[9]) &&
        digito2 === Number(cpf[10]);

      mostrarResultado(valido);
    }

    function mostrarResultado(valido) {
      const resultado = document.getElementById("resultado");

      if (valido) {
        resultado.textContent = "CPF Válido";
        resultado.className = "valido";
      } else {
        resultado.textContent = "CPF Inválido";
        resultado.className = "invalido";
      }
    }
  </script>

</body>
</html>
