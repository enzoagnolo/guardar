<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conversor de Temperatura</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      width: 300px;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    .campo {
      margin-bottom: 15px;
    }

    label {
      display: block;
      margin-bottom: 5px;
    }

    input {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      box-sizing: border-box;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Conversor</h1>

    <div class="campo">
      <label>Celsius (°C)</label>
      <input type="number" id="celsius" step="0.1">
    </div>

    <div class="campo">
      <label>Fahrenheit (°F)</label>
      <input type="number" id="fahrenheit" step="0.1">
    </div>
  </div>

  <script>
    const celsius = document.getElementById("celsius");
    const fahrenheit = document.getElementById("fahrenheit");

    celsius.addEventListener("input", () => {
      const C = Number(celsius.value);

      fahrenheit.value = (F = (C * 9/5) + 32).toFixed(2);
    });

    fahrenheit.addEventListener("input", () => {
      const F = Number(fahrenheit.value);

      celsius.value = (C = (F - 32) * 5/9).toFixed(2);
    });
  </script>
</body>
</html>
