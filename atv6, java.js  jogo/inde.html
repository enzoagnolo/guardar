<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Bolsonarinho</title>

    <style>
        body {
            background-image: url(BRASIL\ NOITE.png);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;

            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;

            transition: 0.5s;
        }

        .container {
            padding: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        h1 {
            color: white;
            text-shadow: 2px 6px 9px black;
            font-style: italic;
        }

        #mainImage {
            max-width: 550px;
            width: 100%;
            height: auto;
            transition: 0.3s;
        }

        #btnImage {
            width: 200px;
            cursor: pointer;
            transition: 0.2s;
        }

        #btnImage:hover {
            transform: scale(1.1);
        }

        #btnImage:active {
            transform: scale(0.9);
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            background-color: #333;
            color: white;
            cursor: pointer;
        }


        .light-mode h1 {
            color: black;
            text-shadow: none;
        }

        /* MODO ESCURO */
        .dark-mode {
            background-image: url("brasilia.png");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

       #ferliniImg {
    position: fixed;
    right: 20px;
    bottom: 20px;

    max-width: 300px;
    display: none;

    border-radius: 12px;
    box-shadow: 0px 4px 15px rgba(0,0,0,0.5);
}


    </style>
</head>

<body class="dark-mode">

    <div class="container">

        <h1>Meu BOLSONARINHO Virtual</h1>

        <img id="mainImage" src="BOLSONARO.png" alt="Pet">

        <img id="btnImage" src="PASTEL.png" alt="Alimentar" onclick="alimentar()">

        <button onclick="toggleModo()" id="modoBtn">Modo Claro</button>

        <button onclick="mostrarFerlini()">MOMENTO FERLINI</button>

    <img id="ferliniImg" src="FERLINI.jpeg" style="display: none; max-width: 400px;">

    </div>

    <script src="script.js"></script>

</body>
</html>
